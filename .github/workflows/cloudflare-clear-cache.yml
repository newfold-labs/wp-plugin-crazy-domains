name: Cloudflare Clear Cache

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.sha }}
  cancel-in-progress: true

# Disable permissions for all available scopes by default.
# Any needed permissions should be configured at the job level.
permissions: {}

jobs:
  clear-cache:
    name: Clear the Cloudflare cache
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions: {} # External Cloudflare API only; no GitHub token usage.
    steps:
      - name: Clear cache for release API
        if: ${{ github.repository == 'newfold-labs/wp-plugin-crazy-domains' }}
        run: |
          curl -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
               -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
               -H "Content-Type: application/json" \
               --data '{"files":["https://hiive.cloud/workers/release-api/plugins/newfold-labs/wp-plugin-crazy-domais"]}'
